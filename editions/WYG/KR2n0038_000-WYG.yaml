body:
  text: 石經考目錄類二金石之屬提要臣等謹案石經考一卷國朝顧炎武撰考石經七種裴頠所書者無傳開元以下所刻亦無異議惟漢魏二種以後漢書儒林傳之訛遂使一字三字争如聚訟歐陽修作集古録疑不能明趙明誠作金石録洪适作隸釋始詳為核定以一字為漢三字為魏然考證雖精而引據未廣論者尚有所疑炎武此書博列衆説互相參校其中如據衞恒書勢以為三字石經非邯鄲淳所書又據周書宣帝紀隋書劉焯傳以正經籍志自鄴載入長安之誤尤為發前人所未發至於洪适隸續尚有漢儀禮一碑魏三體石經數碑又開封石經雖已汩於河水然世傳拓本尚有二碑炎武偶然未考竟置不言是亦千慮一失耳乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:525115ff3b6b21e7f0defb235c85bc2ca77e1f0ca243667b476c727393a13d53
