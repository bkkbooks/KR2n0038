body:
  text: 石經考崑山顧炎武撰總序困學紀聞石經有七漢熹平則蔡雍魏正始則邯鄲淳晉裴頠唐開成中唐玄度後蜀孫逢吉等本朝嘉祐中楊南仲等中興髙廟御書漢石經後漢書靈帝紀熹平四年春三月詔諸儒正五經文字蔡雍傳言六經刻石立于太學門外儒林傳熹平四年乃詔諸儒正定五經刋於石碑為古文篆隸三體書法以相參檢樹之學門使天下咸取則焉注古文謂孔子壁中書篆書秦始皇使程邈所作也隸書亦程邈所獻也主於徒隸從簡易也謝承書曰碑立太學門外瓦屋覆之四面欄障開門於南河南郡設吏卒視之楊龍驤雒陽記載朱超石與兄書云石經文都似碑髙一丈許廣四尺駢羅相接蔡雍傳建寧中校書東觀遷議郎雍以經籍去聖久逺文學多謬俗儒穿鑿疑誤後學熹平四年乃與五官中郎將堂溪典光祿大夫楊賜諫議大夫馬日磾議郎張訓韓説太史令單揚等奏求正定六經文字靈帝許之雍乃自書丹於碑使工鐫刻立於太學門外於是後儒晚學咸取正焉及碑始立其觀視及摹寫者車乘日千餘兩填塞街陌盧植傳時始立太學石經以正五經文字植乃上書曰臣少從通儒故南郡太守馬融受古學頗知今之禮記特多回穴臣前以周禮諸經發起粃謬敢率愚淺為之解詁而家乏無力供繕寫上願得將能書生二人共詣東觀就官財糧專心研精合尚書章句考禮記失得庶裁定聖典刋正碑文嵗餘徴拜議郎與諫議大夫馬日磾議郎蔡雍楊彪韓説等並在東觀校中書五經記傳張馴傳拜議郎與蔡雍共奏定六經文字宦者傳汝陽李巡等五人稱為清忠巡以為諸博士試甲乙科爭第髙下更相告言至有行賂定蘭臺漆書經字以合其私文者乃白帝與諸儒共刻五經文於石於是詔蔡雍等正其文字自後五經一定爭者用息魏石經晉書衛恆傳魏初傳古文者出於邯鄲淳恆祖敬侯寫淳尚書後以示淳而淳不别至正始中立三字石經轉失淳法因科斗之名遂效其形魏書江式傳魏陳留邯鄲淳特善倉雅許氏字指八體六書精究間理以書教諸皇子又建三字石經於漢碑之西其文蔚炳三體復宣校之説文篆隸大同而古字少異據衛恆書勢所言則三字石經非邯鄲淳書晉石經晉書裴頠傳轉國子祭酒奏修國學刻石寫經通典裴頠為祭酒奏立太學起講堂築門刻石以寫五經石經厯代存毁之迹晉書趙至傳詣雒陽遊太學遇嵇康於學寫石經世説注嵇紹序曰先君在太學寫石經古文石季龍載記遣國子博士詣雒陽寫石經魏書太宗紀泰常八年四月帝至雒陽觀石經髙祖紀太和十七年九月壬申幸太學觀石經劉芳傳芳博聞強記兼覽蒼雅尤長音訓昔漢世造三字石經於太學學者文字不正多往質焉芳音義明辨疑者皆往詢訪時人號為劉石經馮熙傳除車騎大將軍開府都督洛州刺史洛陽雖經破亂而舊三字石經宛然猶在至熙與常伯夫相繼為州廢毁分用大至頽落崔光傳領國子祭酒神龜元年夏表曰石經之作起自炎劉繼以曹氏典論魏志明帝太和四年二月戊子以文帝典論刻石立於廟門之外初乃三百餘載計末向二十紀矣按漢熹平四年乙卯至魏神龜元年戊戌計三百四十三年魏文帝黃初七年丙子崩至後魏神龜元年戊戌計二百九十二年昔來雖屢經戎亂猶未大崩侵如聞往者刺史臨州多構圖寺道俗諸用稍有發掘基墌泥灰或出於此皇都始遷尚可補復軍國務殷遂不存檢官私顯隱漸加剝撤由是經石彌減文字增缺職忝胄教參掌經訓不能繕修頽墜興復生業倍深慙恥今求遣國子博士一人堪任幹事者專主周視驅禁田牧制其踐穢料閲碑牒所失次第量厥補綴詔曰此乃學者之根源不朽之永格垂範將來憲章之本便可一依公表光乃令國子博士李郁與助教韓神固劉燮等勘校石經其殘缺者計料石功并字多少欲補治之後靈太后廢遂寢通鑑云初洛陽有漢所立三字石經雖屢經喪亂而初無損失及魏馮熙常伯夫相繼為洛州刺史毁取以建浮圖精舍遂大致頽落所存者委于榛莽道俗隨意取之侍中領國子祭酒崔光請遣官守視命國子博士李郁等補其殘缺胡太后許之會元又劉騰作亂事遂寢孝靜帝紀武定四年八月遷洛陽漢魏石經于鄴水經注漢碑五經立於太學講堂前悉在東側碑上悉刻蔡雍等名魏正始中又立古篆隸三字石經魏初傳古文出邯鄲淳石經古文轉失淳法樹之於堂西石四十八枚廣三丈魏文帝又刋典論六碑附于其次雒陽伽藍記開陽門御道東有漢國子學堂堂前有三種字石經二十五碑表裏刻之寫春秋尚書二部作篆科斗隸三種字漢右中郎將蔡雍筆之遺迹也猶有十八碑餘皆殘毁復有石碑四十八枚亦表裏隸書與水經注言三字者不同寫周易尚書公羊禮記四部又讚學碑一所並在堂前魏文帝作典論六碑至太和十七年猶有四存髙祖題為勸學里武定四年大將軍遷石經于鄴雒陽記太學在雒陽城南開陽門外講堂長十文廣二丈堂前石經四部本碑凡四十六枚少二枚西行尚書周易公羊傳十六碑存十二碑毁南行禮記十五碑悉崩壞東行論語三碑二碑毁禮記碑上有諫議大夫馬日磾議郎蔡雍名此章懷太子注後漢書所引較之伽藍記多論語一經水經注以此為魏正始中所立而蔡雍等名别在堂東與此不合北齊書文宣帝紀天保元年八月詔往者文襄皇帝所運蔡雍石經五十二枚即宜移置學館依次修立周書宣帝紀大象元年二月辛卯詔徙鄴城石經于雒陽隋書經籍志一字石經周易一卷梁有三卷一字石經尚書六卷梁有今字石經鄭氏尚書八卷亡一字石經魯詩六卷梁有毛詩二卷亡一字石經儀禮九卷一字石經春秋一卷梁有一卷一字石經公羊傳九卷一字石經論語一卷梁有二卷一字石經典論一卷三字石經尚書九卷梁有十三卷三字石經尚書五卷三字石經春秋三卷梁有十二卷後漢鐫刻七經著於石碑皆蔡雍所書魏正始中又立一字石經按晉魏二書皆云立三字石經此獨以為一字則所謂因科斗之名遂效其形者安在邪相承以為七經正字後魏之末齊神武執政自洛陽徙于鄴都行至河陽值岸崩遂沒于水其得至鄴者不盈大半按水經注伽藍記所列碑數東二十五西四十八共七十三枚而北齊書所紀在鄴者五十二枚則不過失其二十一枚耳未至於不盈大半也至隋開皇六年又自鄴載入長安失載周大象元年徙雒陽一節史書之疏也劉焯傳言自雒陽運至京師者為信置於祕書內省議欲補緝立於國學尋屬隋亂事遂寢廢營造之司因用為柱礎貞觀初祕書監臣魏徴始收聚之什不存一其相承傳拓之本猶在祕府劉焯傳運雒陽石經至京師文字磨滅莫能知者奉敕與劉炫等考定雜著論跋宋歐陽棐集古録目石經遺字古文篆隸三體凡八百二十九字後漢熹平中校定五經使蔡雍以三體書今其石亡失皆盡皇祐中有蘇望者得摸本左傳於故相王文康家取其完者而刻之莫辨其真偽也在雒陽蘇氏家姚寬西溪叢語漢魏石經堙滅殆盡往年雒陽守因閲營造司所棄碎石識而取之凡得尚書論語儀禮合數十段又有公羊碑一段在長安尚書論語之文今多不同獨公羊當時無他本故其文與今文無異然皆殘缺已甚方勺泊宅編同張舜民畫墁録嘉祐末得石經二段於雒陽城乃蔡雍隸書邵氏聞見後録近年雒陽張氏發地得石十數漢蔡伯喈隸尚書禮記論語俱已壞缺天下碑録漢石經尚書論語公羊在張奎龍圖家趙明誠金石録右漢石經遺字者藏洛陽及長安人家蓋靈帝熹平四年所立其字則蔡雍小字八分書也其後屢經遷徙故散落不存今所有者才數千字皆土壤埋沒之餘磨滅而僅存者爾按後漢書儒林傳序云為古文篆隸三體者非也蓋雍所書乃八分而三體石經乃魏時所建也又按靈帝紀言詔諸儒正五經文字刻石立于太學門外蔡雍傳乃云奏求正定六經文字既已不同而章懷太子注引洛陽記所載有尚書周易公羊傳論語禮記今余所藏遺字有尚書公羊傳論語又有詩儀禮然則當時所立又不止六經矣洛陽記又曰禮記碑上有諫議大夫馬日磾議郎蔡雍等名今論語公羊後亦有堂溪典馬日磾等姓名尚在據雍傳稱雍以經籍去聖久逺文字多謬俗儒穿鑿疑誤後學乃奏求正定自書于碑於是後儒晚學咸取正焉今石本既已磨滅而嵗久轉寫日就訛舛以世所傳經書本校此遺字其不同者已數百言又篇第亦時有小異使完本具存則其異同可勝數邪然則豈不可惜也哉而後世學者於去古數千百嵗之後盡絀前代諸儒之論欲以己之私意悉通其説難矣余既録為三卷又取其文字不同者具列于卷末云黃伯思東觀餘論漢石經與今文不同者殊多今略記之書女毋翕侮成人今本女無侮老成人保后胥髙保后胥戚女永勸憂女誕勸憂女有近則在乃心今近作戕女比猶念以相從今作女分猷各翕中各設中爾惠朕曷祗動萬民以遷爾謂朕曷震動天既付命今付作孚曰陳其五行汨陳嚴恭寅畏天命自亮以民祗懼今亮作度以作治懷保小人惠于矜寡今人作民于作鮮毋兄曰無皇曰則兄自敬德今兄作皇旦以前人之微言今作徽言是罔顯哉厥世今哉作在文王之鮮光今作耿光通殷就大命逹殷集大命論語意與之與今意作抑孝于惟孝今于作乎朝聞道夕死可也今也作矣是魯孔丘與曰是是知津矣是魯孔丘與曰是也曰是知津矣耰而不輟子路以告子憮然耰而不輟子路行以告夫子憮然置其杖而耘今置作植其斯以乎其斯而已矣譬諸宫牆今諸作之賈諸賈之哉今賈作沽又論語每篇各計其章數其最後云凡草篇萬五千七百一十字又記諸家異文若曰在於蕭牆之內蓋毛包周氏於今論語無蓋氏毛氏書此石在雒宫前御史臺中年久推散雒人好事者時時得之今張燾龍圖家有十版最多張氏壻家有五六版王晉玉家有小塊雒中所有者止此豫皆得其拓本論語之末題云詔書與博士臣左立劉本無立字郎中臣書上臣下皆缺當是著書者姓名或云此即蔡雍書姓名既亡無以辨之獨刻者陳興姓名甚完又有一段公羊不知誰氏所得其末云溪典諫議大夫臣馬日磾臣趙域議郎臣劉𢎞郎中臣張文臣蘇陵臣傅楨雜雜未詳溪上缺當是堂溪典也此蓋鴻都一字石經然經各異手書不必皆蔡雍也三字者不見真刻獨此一字者乃當時所刻字畫髙古精善殊可寶重開元中嘗藏拓本於御府以開元二字小印印之與法書名畫同藏蓋唐世以前未録前代石刻獨此見收其可寶如此董逌廣川書跋石經不盡蔡雍書如馬日磾輩相與成之然漢隸簡古深於法度亦後世不及趙綽曰唐造防秋館時穿地多得石經故雒中人士逮今有之國初開地唐御史府得石經十餘石此又唐末淪沒之所出也洪適隸釋石經尚書殘碑命孔本作身何及相闕𣪚孔作憸下闕言曰人維舊孔舊上有求下闕二字􅀈孔作求舊下闕有志女母翕侮成人毋流孔作汝無侮老成人無弱下闕各共爾事齊乃位度爾孔作乃口下闕民之承保后􅀢髙孔作戚鮮以􅄇浮下闕試以爾孔作汝遷安定厥國孔作邦孔無女􅄇下闕其或迪孔作㮷自怨孔作怒下闕永孔作誕勸憂今其有今罔後女何下闕之勞爾先豫􅄇下闕于茲髙后乃知孔作崇降疾白下闕能迪古我先后下闕民女有近孔作戕則在乃心我先后綏下闕興降永於戲孔作崇降弗祥嗚呼今豫下闕絶逺女比猶孔作分猷念以相從各翕孔作設中下闕建乃家股孔作盤闕一字既下闕衆白女罔台民孔作無戲怠孔作懋建大命今我孔作豫下闕凶德綏孔作嘉績下闕今孔無爾惠孔作謂朕闕孔作震動萬民以遷肆上下闕乘孔作隱哉豫其􅀈孔作懋蕳相爾念敬我衆朕􅄇已上盤庚三篇民中絶命民有不若德􅄇聽天既付孔作孚已上髙宗肜日篇􅍏遺任孔作壬父母弟􅄇迪乃維四方下闕􅄇于四伐五伐六伐七伐乃已上牧誓篇伊孔無鴻孔作洪水白孔作汨陳其行帝下闕白建用皇極次六白艾孔作乂用三德下闕潤下作鹹炎上作苦曲直作下闕食二白偵三白祀四白司空下闕極凡􅍏庶民無有涇人無有下闕明人之有能有為使其行而下闕路毋偏毋黨王道蕩蕩毋黨下闕為天下王三德孔三上有六一白正直二下闕家而孔無凶于而國人用闕頗辟孔作僻下闕乃心及卿闕及庶民孔作人範篇已上洪維天命元孔元作無違朕􅄇敢有下闕時維天命王白告爾孔無二字多下闕茲雒孔作洛豫維四方􅘩攸責亦維爾下闕有年于茲雒爾小子乃興從爾遷王已上多士篇孔作穡之艱難乃孔作逸乃憲孔作諺既延孔作誕􅄇孔作否則侮􅍏下闕中宗嚴恭寅畏天命自亮以孔作度治民懼下闕或怨肆髙宗之饗國百年孔作享國五十有九年自時􅍏後下闕功田功徽懿共懷保小人孔作民惠于矜孔作鮮鰥下闕酒孔作淫毋孔作逸于遊田維闕共孔作無淫于觀于逸于遊于田以萬民惟正之供毋兄孔作無皇白今日下闕􅍏􅄇聖孔作聽人乃訓變孔變上有之力亂正㓝孔正上有先王之至于下闕則兄白孔作皇自敬德􅍏白朕之允下闕公白於戲嗣王于茲孔監上有其已上無逸篇道孔作終出于􅄇詳於君闕白時我已上君奭篇我則天之已上多方篇常伯常任辟孔作準下闕亂孔無謀面用下闕于􅍏邑其在下闕有會孔作俊心以敬事下闕王維􅍏孔􅍏上有克度孔作宅心乃下闕受茲孔作此其孔作基於戲下闕旦以前孔作已受人之孔作徽言下闕訓德孔德上有于是罔顯哉孔作在􅍏世下闕王之鮮孔作耿光以揚武王已上立政篇几乃闕召大保下闕通孔作逹就孔作集大命在下闕非幾茲即孔作既下闕黼衣孔作扆命篇已上顧右石經尚書殘碑盤庚篇百七十二字髙宗肜日篇十五字牧誓篇二十四字洪範篇百八字多士篇四十四字無逸篇百三字君奭篇十一字多方篇五字立政篇五十六字顧命篇十七字合五百四十七字熹平四年議郎蔡雍所書者漢儒傳伏生尚書有歐陽大小夏侯之學孔安國尚書漢人雖有為之訓傳者然不立於學官永嘉之亂三家之書並亡故孔氏傳獨行以其書校之石本多十字少二十一字不同者五十五字借用者八字鴻艾劮猶之類是也通用者十一字於戲母女之類是也孔氐敘商三宗以年多少為先後此碑獨闕祖甲計其字蓋在中宗之上以傳序為次也但云髙宗饗國百年異爾范史云蔡雍以俗儒穿鑿經籍疑誤後學與堂溪典馬日磾等奏求正定六經文字時博士試甲乙科爭第髙下至有行賂改蘭臺漆書經字者靈帝乃從諸儒之請刋石立之太學天下咸取則焉碑髙一丈廣四尺陸機洛陽記云碑凡四十六書易公羊二十八碑其十二毁論語三碑其二毁禮記十五碑皆毁北齊徙之鄴都至河陽岸頽半沒于水隋復載入長安有易一卷書六卷魯詩六卷儀禮九卷春秋一卷公羊九卷論語一卷未及補治而亂作營繕者至用為柱礎唐初魏鄭公收聚之十不存一則石經之散亡久矣本朝一統時遺經斷石藏於好事之家猶崑山片玉已不多見今京華鞠為氊罽之鄉殘碑日益鮮矣豫既集隸釋因以所有鑱之會稽蓬萊閣㔠音慉勉也劮亦逸字石經魯詩殘碑惟毛作維是褊心是以為刾葛屨下闕汾一曲言采其藚彼其之子美下闕之誰知闕一字毛誰上有其之蓋亦勿思園有棘其實之下闕父兮父闕一字毛無曰嗟豫子行役夙夜毋毛作無已尚毛作上慎下闕哉猶來毋死􅕾岵三章章六句十下闕毛作猗􅄇稼􅄇毛作穡胡取禾三百廛兮􅄇狩􅄇下闕特兮彼君子兮􅄇素食兮欿欿毛作坎伐輪兮下闕毋食我􅀢三歲宦毛作貫女莫我肯顧逝將去女下闕宦女莫我肯勞闕將去女適彼樂郊樂郊下闕蟋蟀在堂歲聿其逝今我􅄇樂日月其闕句山有蓲毛作樞隰有榆子有衣裳弗曳下闕酒食胡毛作何􅄇日鼓瑟且以喜樂下闕既見君子云胡其憂楊下闕右石經魯詩殘碑百七十三字魏唐國風數篇之文也與毛詩異者如猗作兮貫作宦樞作蓲數字又有一段二十餘字零落不成文惟有叔于田一章及女曰雞八字可讀其間有齊韓字蓋敘二家異同之説猶公羊碑所云顔氏論語碑所云盍毛包周之比也漢代詩分為四在東京時毛氏詩不立學官隋志有石經魯詩六卷此碑既論齊韓於後則知隋志為然也石經儀禮殘碑東面主人下闕卒坐奠拜執下闕人盥洗升媵觚于賔下闕上拜受于莚前下闕首公答拜媵者立下闕媵者執觶待于下闕公坐取大右石經儀禮殘碑四十五字皆大射儀之文也石磨滅字畫比它經不明白靈帝紀云詔諸儒正五經文字刻石立于太學蔡雍傳則云奏求正定六經紀傳既已不同陸機洛陽記所載但有書易公羊禮記論語爾惟隋志云後漢刻七經於石碑皆蔡雍所書其目有一字石經儀禮九卷乃漢史陸記之疏略也未央宫有曲臺殿天子射宫也西京無太學於此行禮故后蒼著書説禮數萬言名曰曲臺記今禁中有選德殿蓋坐觀射之地而清間之燕咨訪治道率在於是殆與曲臺暗合古者射為六藝之一儀禮一經説射者兩篇後世非介胄之士則不習與古殊矣媵觚媵云者媵蓋送也石經公羊殘碑翬者何公子翬闕一字何以􅄇稱公下闕柏於是謂柏白吾為闕三字矣隱白下闕之之辭也然則孰立之石闕二字之石踖板本作碏立下闕美大之之辭也棠者何濟闕一字之邑也曷為下闕仲子板本有也字桓未君則曷為祭仲子闕一字為桓立故下闕諸侯四諸公者何諸闕一字者何天子三公稱下闕相處乎內始闕一字諸公放板本作昉於此乎前此矣前下闕其成也白吾成敗矣吾與鄭人未有成板本有也字吾下闕後為年外取邑􅄇書此何以書久也下闕弟毋兄稱兄凡闕五字之大夫也此下闕之邑也天子有闕四字諸侯皆從泰山下闕而葬􅄇日卒赴而闕一字􅄇告公曷為與者下闕大夫之未命者也十年此公子翬也何下闕外於外大惡書小惡􅄇書於內大惡諱小下闕國也何以􅄇書葬隱之也何隱爾試板本作弒也試下闕葬板本有以為字􅄇繫闕一字臣子闕二字薨何以􅄇地􅄇忍言已上隱公何易之也易之則其下闕諱取周田也諱取已上桓公十有四年何以闕一字記異也何異下闕則至無王者則􅄇至有以告者曰有而下闕乎隱祖之所遝板本作逮聞闕一字所見異辭所聞異辭所下闕􅄇亦樂乎堯舜闕二字君子也制春秋之義以已上哀公有傳桓公二年顔氏有所見異辭所聞異下闕何以書記災也世年顔氏言君出則已入下闕顔氏無伐而􅄇言圍者非取邑之辭也十下闕溪典諫議大夫臣馬日磾臣趙域議臣闕二字臣𢎞中臣張彣臣傅楨􅀈右石經公羊殘碑三百七十五字自隱公四年至桓公元年及哀公十四年之文也所書者皆是公羊氏傳辭而無春秋正經又有顔氏説石文斷續不可考繹蓋嚴顔異同之辨也以今板本校之惟易四字省四字爾漢注引陸機洛陽記云禮記碑上有馬日磾蔡雍名今此碑有堂溪典八人姓名論語碑亦有左立二人姓名陸氏所記未之詳也石經論語殘碑鮮矣不好犯上而好他下闕本本立闕一字道生孝下闕曰道千棄之國敬事下闕使民以時子曰弟子下闕而有信雖曰未學吾必謂下闕君子􅄇重則􅄇威學則下闕與意板本作抑豫之與子贛板本作貢曰夫子闕五字以得之夫子之求之也下闕道斯為美小大由之有所􅄇行知闕五字禮莭之亦􅄇板本有可字行下闕焉可謂好學已矣板本作也已下闕而無諂富而無驕下闕告諸往而知來下闕人之􅄇下闕章已上學而篇免而無恥道之以德齊之下闕乎板本作于學丗下闕孫問孝於我我對曰毋違樊遲闕一字何下闕曰生下闕葬之以禮祭下闕以别子夏問孝子曰色難有下闕勞有下闕孝下闕廋哉人焉廋板本有哉字子曰溫故而知下闕子下闕器子贛問下闕乎異端斯􅊣也已子曰下闕子下闕曰何為則民服孔子對曰下闕之下闕子曰書云孝于板本作乎惟孝友于兄下闕也周因於段禮所損益可知下闕為政篇已上曰人而􅄇仁如禮何人而􅄇仁如樂何林闕十一字與下闕與對曰􅄇䁩子曰闕五字山􅄇如林放闕九字也射下闕曰起豫板本有者字商也始可下闕子曰下闕段禮吾下闕也知其説闕三字天下也其闕一字示諸斯乎下闕如神在下闕於二代郁郁乎下闕太廟下闕子知禮下闕禮下闕也下闕以柏周人以栗曰使民下闕往下闕門國板本作邦君為兩君之好有反闕一字管氏下闕知禮下闕吾未嘗􅄇得見也役者闕二字出曰下闕無道也久下闕觀之哉凡草六章已上八佾篇人子曰苟志於仁矣無惡板本有也字子曰富與貴是人之所欲也下闕顛沛必於是子闕二字未見好仁板本有者字惡􅄇仁者好仁者無以尚之下闕過也各於其黨闕二字斯知仁矣子曰朝聞道夕死可也板本作矣下闕子懷㓝小人懷惠子曰放於利而行多怨子曰能以禮下闕曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已下闕曰父母在􅄇逺遊遊必有方子曰三年無改於父之下闕里仁篇已上有三年之愛於闕一字父母板本有乎字子曰飽食終日無所用心難矣哉下闕君子板本有亦字有惡乎子曰有板本有惡字惡稱人之惡者惡居下板本有流字而訕上者惡下闕之則􅄇孫逺之則怨子曰年􅕊板本有而字見惡為其終也已凡草六章已上陽貨篇枉道而事人何闕一字去父母之國板本作邦闕一字景公孔子曰若季氏下闕子曰鳳兮鳳兮何而板本無而字德之衰也板本無也字往闕二字可諫也板本無來者猶可追也板本無下闕執車板本作輿者為誰子板本無子路曰為孔丘曰是魯孔丘與曰是板本有也曰二字是知津矣下闕若從避板本作辟丗之士哉擾板本作耰有而字􅄇輟子路板本有行字以告板本有夫字子憮然曰鳥獸􅄇可與同下闕穀􅄇分孰為夫子置板本作植其杖而耘板本作藝子路拱而闕一字止子路宿殺雞下闕禮板本作義如之何其廢之也板本無欲潔其身而亂大倫君子之仕也行其義下闕志辱身矣言中倫行中慮其斯以乎板本作而己矣謂虞仲夷佚板本作逸隱居下闕少闕陽擊磬襄入于海周公謂魯公曰君子􅄇施其親下闕微子篇已上交於子張子闕一字曰子夏闕一字何對曰子夏曰可者闕四字者距板本作拒下闕子夏曰雖闕五字觀者為致逺恐泥是以下闕其事君子學下闕子夏曰小人之過下闕曰下闕子夏曰大德闕五字出入可也子斿板本作遊闕六字子下闕君子之道為可闕二字有闕一字有卒者其唯聖人下闕仕而下闕曽子曰吾聞諸板本有夫字子人未有自致也者板本作者也也親喪乎闕一字子曰下闕如得其情則哀矝而勿喜子贛曰紂之闕一字善闕一字是其板本作之下闕贛曰仲尼為學子贛曰文武之道未隧板本作墜於地在人賢者志板本作識其下闕告子贛闕一字贛曰辟諸板本作之宫蘠板本作牆賜之蘠闕二字窺見室家之好夫下闕尼􅄇可毁闕二字人之賢者丘陵也闕三字踰也仲尼日月也下闕一言以為􅄇知言􅄇可􅄇愼也夫子之􅄇可及也猶天之下闕子張篇已上􅄇蔽蕳在帝心朕躬有罪毋板本作無以萬方萬方有闕一字板本有兩罪字在朕躬下闕歸心為所重民食喪闕一字寬則得衆敏則有功闕一字則説下闕􅄇驕威而􅄇猛子闕一字曰何謂惠而􅄇費子曰闕一字民之下闕尊其瞻視儼闕三字而畏之斯􅄇亦威而􅄇猛乎下闕堯曰篇已上凡草篇萬五千七百一闕一字字賈板本作沽諸賈之哉包周闕四字蓋肆乎其肆也闕一字周下闕曰言闕一字而在於蕭蘠之內盍毛包周無於下闕詔書與博士臣左立郎中臣孫表工陳興刻右石經論語殘碑九百七十有一字前四篇後四篇之文也每篇必計其章終篇又總其字又載盍毛包周有無不同之説以今所行板本校之亦不至甚異其文有增損者其字亦有假借及用古者有字異而訓不逺若置其杖賈之哉者漢人作文不避國諱威宗諱志順帝諱保石經皆臨文不易樊毅碑命守斯邦劉熊碑來臻我邦之類未嘗為髙帝諱也此碑邦君為兩君之好何必去父母之邦尚書安定厥邦皆書邦作國疑漢儒所傳如此非獨逺避此諱也水經云光和六年立石於太學其上悉刻蔡雍名魏正始中又刻古篆隸三字石經蓋諸儒受詔在熹平而碑成則光和年也隋志有一字石經七種三字石經三種其論云漢鐫七經皆蔡雍書又云魏立一字石經其説自相矛盾新舊唐志有今字石經七種而注論語云蔡雍作又有三字石經古篆兩種蓋唐史以隸為今字也觀遺經字畫之妙非蔡中郎輩不能為以黃初後來碑刻比之相去不啻霄壤豈魏人筆力可到當以水經為據三體者乃魏人所刻儒林傳云為古文篆隸三體者非也史稱雍自書丹使工鐫刻今所存諸經字體各不同雖雍能分善隸兼備衆體但文字之多恐非一人可辦史云雍與堂溪典楊賜馬日磾張訓韓説單揚等正定諸經今公羊論語之後惟堂溪日磾二人姓名尚存别有趙域劉弘張文蘇陵傳楨左立孫表數人竊意其間必有同時揮毫者豫詳玩遺字公羊詩書儀禮又在論語上劉寬碑隂王曜題名則公羊詩書之鴈行也黃初孔廟碑則論語之苗裔也識者當能别之張縯石經跋蔡雍本傳稱雍自書丹於碑不言為何體書今世所傳皆為隸體至儒林傳序則云為古文篆隸三體書法以相參檢注言古文謂孔氏壁中書以縯考之孔壁所藏皆科斗文字孔安國當武帝之世已稱科斗書無能知者其承詔為尚書五十九篇作傳為隸古定不復從科斗古文雍獨安能具三體書法於安國之後三百年哉漢建武時杜林避地河西得古文尚書一軸諸儒共傳寶之一軸已為世所珍如此熹平距建武又幾載乃謂六經悉能為古文非事情也或以雍以三體參檢其文而書丹於碑則定為隸亦如孔安國之書傳耶儒林傳序疑字有誤者初雍正定六經與堂溪典等數人同受詔今六經字體不一當是時書丹者亦不獨雍也姑識其末以俟博識君子唐明皇御書孝經金石録唐明皇注孝經四卷天寶四載九月八分書見存西安府學唐石經舊唐書文宗紀開成二年宰臣判國子祭酒鄭覃進石壁九經一百六十卷時上好文鄭覃以經義啓導稍折文學之士遂奏置五經博士依漢蔡雍刋碑列於太學創立石壁九經諸儒校正訛謬上又令翰林勒字官唐玄度復校字體又乖師法故石經立後數十年名儒皆不窺之以為蕪纍甚矣新唐書鄭覃傳始覃以經籍刓謬博士陋淺不能正建言願與巨學鴻生共力讎刋準漢故事鏤石太學示萬世法詔可覃乃表周墀崔球張次宗孔溫業等是正其文刻于石髙重傳為祭酒與鄭覃刋定九經于石儒學傳序文宗定五經鑱之石張參等是正訛文唐會要太和七年二月五日敕唐玄度覆定石經字體十二月敕於國子監講論堂兩廊創立石九經并孝經論語爾雅共一百五十九卷字樣四十卷開成二年八月國子監奏覆定五經字體官翰林待詔唐玄度狀準太和七年二月五日較覆定九經字體今所詳覆多因司業張參五經文字為準其舊字樣歲月將久點畫參差傳寫相承漸致訛誤今依字樣參詳改正諸經别有疑闕舊字樣未載者古今體異雖篆隸不同總據説文即古體驚俗近代文字或傳寫乖訛今與校勘官取其適中篡録為新加九經字樣一卷請附于五經字樣之末從之新唐書藝文志張參五經文字三卷唐玄度九經字樣一卷中興書目字樣一卷開成丁巳歲唐玄度撰序曰奉詔覆定國學石經字體刪補張參五經文字采其疑誤舊未載者撰成一卷凡七十六部見存西安府學蜀石經成都記偽蜀孟昶有國其相母昭裔刻孝經論語爾雅周易尚書周禮毛詩儀禮禮記左傳凡十經于石其書丹則張德釗楊鈞張紹文孫逢吉朋吉周德貞也石凡千數盡依太和舊本厯八年乃成公榖則有宋田元均所刻古文尚書則朝公武所補也胡元質宗愈作堂以貯之名石經堂在府學玉海蜀石經周易後書廣政十四年歲次辛亥五月二十日按此後周太祖廣頥元年公羊傳後書大宋皇祐元年歲次己丑九月辛卯朔十五日乙巳工畢偽蜀相母昭裔取唐太和本刻石於成都學宫與後唐板本不無小異乾道中朝公武參校二本取經文不同者三百二科著石經考異亦刻於石張㶾又校注文同異為石經注文考異四十卷朝公武石經考異序鴻都石經自鄴遷雍遂茫昧于人間唐太和中復刻十二經立石國學後唐長興中詔國子博士田敏與其僚校諸經鏤之板故今世太學之傳獨此二本爾按趙清獻公成都記偽蜀相母昭裔捐俸金取九經琢石於學宫依太和舊本令張德釗書皇祐中田元均補刻公羊榖梁二傳然後十二經始全至宣和間席升獻又刻孟子參焉今考之孝經論語爾雅廣政甲辰歲張德釗書周易辛亥歲楊鈞孫逢吉書尚書周德貞書周禮孫朋吉書毛詩禮記儀禮張紹文書左氏傳不志何人書而祥字闕其畫亦必為蜀人所書然則蜀人之立石蓋十經其書者不獨德釗而能盡用太和本固已可嘉凡厯八年其石千數昭裔獨辦之尤偉然也公武異時守三營嘗對國子監所摹長興板本讀之其差誤蓋多矣昔議者謂太和石本校寫非精時人弗之許而世以長興板本為便國初遂頒布天下收向日民間寫本不用然有訛舛無由參校判知其謬猶以為官既刋定難於獨改由是而觀石經固脫錯而監本亦難盡從公武至少城寒暑一再易節暇日因命學官讎校之石本周易説卦乾健也以下有韓康伯注略例有邢璹注禮記月令從唐李林甫改定者監本皆不取外周易經文不同者五科尚書十科毛詩四十七科周禮四十二科儀禮三十一科禮記三十二科春秋左氏傳四十六科公羊傳二十一科榖梁傳一十三科孝經四科論語八科爾雅五科孟子二十七科其傳注不同者尤多不可勝紀獨計經文猶三百二科迹其文理雖石本多誤然如尚書禹貢篇夢土作乂毛詩日月篇以至困窮而作是詩也左氏傳昭公十七年六物之占在宋衛陳鄭乎論語述而篇舉一隅示之衛靈公篇敬其事而後食其祿之類未知孰是先儒有改尚書無頗為無陂改春秋郭公為郭亡者世皆譏之此不敢決之以臆姑兩存焉亦鐫諸樂石附于經後不誣方將必有能考而正之者洪邁容齋隨筆孟蜀所刻石經其書淵世民三字皆闕畫蓋避唐髙祖太宗諱也范成大記考異并序凡二十一碑在石經堂中宋開封府石經玉海宋仁宗至和元年八月十六日己酉以皇姪右屯衛大將軍克繼書國子監石經以上所寫石經論語求書石國子監帝欲旌勸宗室特從其請二年九月十五日功畢上之賜銀幣仁宗命國子監取易詩書周禮禮記春秋孝經為篆隸二體刻石兩楹至和二年三月五日判國子監王洙言國子監刋立石經至今一十五年止孝經刋畢尚書論語見書鐫未就乞促近限畢工餘經權罷從之嘉祐三年五月十五日王洙薦大理丞楊南仲石經有勞賜出身六年二月缺日國子監言草澤章友直篆石經畢詔補試將作監主簿友直不願仕賜以銀絹五月以同篆石經殿中丞張次立與堂除書目石經七十五卷楊南仲書周易十書十三詩二十春秋十二禮記二十皆具真篆二體周密癸辛雜識汴學即昔時太學舊址九經石板堆積如山一行篆字一行真字宋髙宗御書石經玉海紹興十三年二月內出御書左氏春秋及史記列傳宣示館職少監秦熺以下作詩以進六月內出御書周易九月四日上諭輔臣曰學寫字不如便寫經書不惟可以學字又得經書不忘既而尚書委知臨安府張澄刋石頒諸州學十四年正月出御書尚書十月出御書毛詩十六年五月又出御書春秋左傳皆就本省宣示館職作詩以進上又書論語孟子皆刋石立于太學首善閣及大成殿後三禮堂之廊廡繫年録十三年十一月丁卯秦檜奏前日蒙付出御書尚書來日欲宣示從臣時上寫六經論孟皆畢因請刋石于國子監仍頒墨本賜諸路州學詔可淳熙四年二月十九日詔知臨安府趙磻老於太學建閣奉安石經置碑石于閣下墨本于閣上以光堯石經之閣為名朕當親寫參政茂良等言自昔帝王未有親書經傳至數千萬言者不惟宸章奎畫照耀萬世崇儒重道至矣上曰太上字畫天縱冠絶古今五月二十四日磻老奏閣將就緒其石經易詩書春秋左氏傳論語孟子外尚有御書禮記中庸大學學記儒行經解五篇不在太學石經之數今摉訪舊本重行摹勒以補禮經之闕從之六月十三日御書光堯御書石經之閣牌賜國子監元史申屠致逺傳西僧楊璉真伽作浮圗於宋故宫欲取髙宗所書九經石刻以築基致逺力拒之乃止見存杭州府學朝公武石刻古文尚書朝公武古文尚書序秦更前代法制以來凡曰古者後世寥乎無聞書契之作固始於伏羲然變狀百出而不彼之若者亦已多矣尚書一經獨有古文在豈非得於壁間以聖人舊藏而天地亦有所護不忍使之絶滅中雖遭漢巫蠱唐天寶之害終不能晦蝕今猶行於人間者豈無謂邪况孔氏謂尚書以其上古之書也當時科斗既不復見其為隸古定此實一耳雖然聖人逺矣而文字間可以概想則古書之傳不為浪設豫抵少城作石經考異之餘因得此古文全編於學宫乃延士張㶾倣吕氏所鏤本書丹刻諸石是不徒文字足以貽世若二典曰若粵􅀢之類學者可不知歟嗚呼信而好古學于古訓乃有獲蓋前牒所令方將配孝經周易經文之古者附於石經之列以故弗克第述一二以示後之好奇字者識又安知世無楊子雲時乾道庚寅仲夏望日石經考
